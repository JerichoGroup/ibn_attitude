version: "3.8"
services:
  pixhawk_bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile
      secrets:
        - gh_token
    container_name: pixhawk_bridge_arm
    volumes:
      - ./src:/root/dev/src
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
      - /dev/ttyACM1:/dev/ttyACM1
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    restart: unless-stopped
    # command: "ros2 launch ibn_attitude pixhawk_bridge.launch.py"
    command: "bash"


secrets:
  gh_token:
    file: ./ibn_token_secret