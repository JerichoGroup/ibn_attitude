[tool.ruff]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]
line-length = 120
indent-width = 4
target-version = "py310"

[tool.ruff.format]

quote-style = "double"

indent-style = "space"


[tool.ruff.lint]
select = [
    "E",        # Errors
    "F",        # pyflakes
    "W",        # Warnings
    "I",        # Isort
    "N",        # pep8-naming
    "ANN",      # flake8-annotations
    "Q",        # flake8-quotes
    "ERA",      # Eradicate
    "PLR",      # Refactor
    "A",        # flake8-builtins
    "ASYNC",    # flake8-async
    "PTH",      # flake8-use-pathlib
    "FIX",      # flake8-fixme
    "TD",       # flake8-todos
    "D",         # pydocstyle
]

ignore = [
    "E501",     # Line too long ({width} > {limit})
    "D203",     # 1 blank line required before class docstring
    "D202",     # No blank lines allowed after function docstring (found {num_lines})
    "D212",     # Multi-line docstring summary should start at the first line
]

fixable = ["ALL"]
unfixable = []



[tool.ruff.lint.pydocstyle]
ignore-decorators = []
property-decorators = []

[tool.ruff.lint.isort]
combine-as-imports = true
force-sort-within-sections = true
from-first = true

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "D100"]
"src/ibn_mavlink/launch/pixhawk_bridge.launch.py" = ["N999"]
"src/ibn_mavlink/ibn_mavlink/pixhawk_bridge/translator.py" = ["ANN401"]
"src/ibn_mavlink/ibn_mavlink/pixhawk_bridge/client.py" = ["ANN401"]
"src/ibn_mavlink/ibn_mavlink/pixhawk_bridge/node.py" = ["ANN401"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
allow_redefinition = true

[[tool.mypy.overrides]]
module = "launch.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true
